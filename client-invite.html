<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password | Fitness with Benjamin</title>
  <meta name="description" content="Set or reset your Fitness with Benjamin password." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=password-reset-1" />
</head>
<body class="login-page">
  <header class="site-header">
    <a class="brand" href="index.html#top" aria-label="Fitness with Benjamin home">
      <span>FWB</span>
      <strong>Fitness with Benjamin</strong>
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="index.html#training">Training</a>
      <a href="index.html#results">Results</a>
      <a href="index.html#start">Start</a>
    </nav>
    <div class="header-actions">
      <a class="login-link is-current" href="client-login.html?v=invite-list-layout-fix-1">
        <span class="desktop-label">Client Login</span>
        <span class="mobile-label">Login</span>
      </a>
    </div>
  </header>

  <main class="client-access">
    <section class="access-intro" aria-labelledby="invite-title">
      <p class="kicker">Account access</p>
      <h1 id="invite-title">Set password</h1>
      <p>Create a new password to open your private training portal.</p>
    </section>

    <section class="access-panel" aria-label="Set account password">
      <div class="access-panel-heading">
        <p class="kicker">Password</p>
        <h2>Account access</h2>
      </div>
      <form class="login-form" id="client-invite-form" hidden>
        <label>
          New password
          <input type="password" name="password" placeholder="New password" autocomplete="new-password" required minlength="8" aria-label="New password" />
        </label>
        <label>
          Confirm password
          <input type="password" name="confirm_password" placeholder="Confirm password" autocomplete="new-password" required minlength="8" aria-label="Confirm password" />
        </label>
        <button class="button button-dark" type="submit">Set password</button>
      </form>
      <p class="login-status" id="client-invite-status" role="status">Checking password link...</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/client-invite.js?v=password-reset-1"></script>
</body>
</html>
